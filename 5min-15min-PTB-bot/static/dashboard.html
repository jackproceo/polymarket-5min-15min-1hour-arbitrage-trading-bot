<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BTC 自动交易仪表盘</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #f2f4f8;
      --bg-secondary: #ffffff;
      --surface: #ffffff;
      --surface-alt: #f0f2f6;
      --surface-hover: #e8ecf3;
      --border: #dce1ea;
      --border-light: #e6eaf2;
      --text-primary: #1c1f2b;
      --text-secondary: #5e6e85;
      --text-tertiary: #8e9db0;
      --accent: #3b82f6;
      --accent-soft: rgba(59, 130, 246, 0.08);
      --green: #10b981;
      --green-soft: rgba(16, 185, 129, 0.08);
      --red: #ef4444;
      --red-soft: rgba(239, 68, 68, 0.08);
      --yellow: #f59e0b;
      --yellow-soft: rgba(245, 158, 11, 0.08);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.02);
      --shadow-lg: 0 12px 24px rgba(0,0,0,0.07);
      --radius: 12px;
      --radius-sm: 8px;
    }
    html { font-size: 14px; }
    body {
      font-family: "Inter", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
    }
    .wrap { max-width: 1440px; margin: 0 auto; padding: 20px 24px 40px; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      padding: 16px 0 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .header-left { display: flex; flex-direction: column; gap: 4px; }
    .header-title {
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #1c1f2b 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-sub {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .header-sub span { color: var(--accent); }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .interval-group {
      display: flex;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px;
    }
    .interval-btn {
      border: none;
      background: transparent;
      color: var(--text-tertiary);
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .interval-btn:hover { color: var(--text-primary); }
    .interval-btn.active {
      background: var(--accent);
      color: #ffffff;
    }
    .interval-btn:disabled { opacity: 0.4; cursor: wait; pointer-events: none; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .badge-accent {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
    }

    /* Grid */
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 16px; }
    .grid-2 { display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; }
    @media (max-width: 1100px) { .grid-3 { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 860px) { .grid-3, .grid-2 { grid-template-columns: 1fr; } }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px 20px;
      box-shadow: var(--shadow-md);
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }
    .card-badge {
      font-size: 0.65rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
    }
    .card-badge-db { background: var(--green-soft); color: var(--green); }
    .card-badge-live { background: var(--yellow-soft); color: var(--yellow); }

    /* Metric grid */
    .metrics { display: grid; gap: 10px; }
    .metrics-2 { grid-template-columns: 1fr 1fr; }
    .metrics-3 { grid-template-columns: 1fr 1fr 1fr; }
    .metrics-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
    @media (max-width: 600px) {
      .metrics-2, .metrics-3, .metrics-4 { grid-template-columns: 1fr 1fr; }
    }
    .metric {
      background: var(--surface-alt);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      border: 1px solid var(--border);
    }
    .metric-label {
      font-size: 0.6875rem;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .metric-value {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      font-family: "JetBrains Mono", monospace;
    }
    .metric-value-sm { font-size: 1rem; }
    .metric-sub {
      font-size: 0.7rem;
      color: var(--text-tertiary);
      margin-top: 2px;
    }
    .text-up { color: var(--green); }
    .text-down { color: var(--red); }
    .text-warn { color: var(--yellow); }
    .text-muted { color: var(--text-tertiary); }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      margin-top: 4px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
    }
    thead { background: var(--surface-alt); }
    th {
      text-align: left;
      padding: 10px 12px;
      font-weight: 600;
      color: var(--text-tertiary);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      font-family: "JetBrains Mono", monospace;
      font-size: 0.7rem;
      color: var(--text-secondary);
      white-space: nowrap;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface-hover); }
    .table-empty {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-tertiary);
      font-size: 0.8125rem;
    }

    /* Logs */
    .logs-box {
      height: 320px;
      overflow-y: auto;
      background: #fafbfc;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.7rem;
      line-height: 1.55;
    }
    .log-line { color: var(--text-tertiary); padding: 1px 0; }
    .log-OK, .log-TRADE { color: var(--green); }
    .log-WARN { color: var(--yellow); }
    .log-ERR { color: var(--red); }

    /* Loading skeleton */
    .loading { color: var(--text-tertiary); font-size: 0.75rem; }
    .pulse { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }

    /* Count badge */
    .count-badge {
      font-size: 0.65rem;
      color: var(--text-tertiary);
      font-weight: 500;
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- ======== HEADER ======== -->
  <header class="header">
    <div class="header-left">
      <div class="header-title">Polymarket BTC 自动交易</div>
      <div class="header-sub">市场: <span id="marketSlug">-</span> &middot; <span id="simMode"></span></div>
    </div>
    <div class="header-right">
      <div class="interval-group" role="group" aria-label="周期切换">
        <button type="button" class="interval-btn" data-min="5">5m</button>
        <button type="button" class="interval-btn" data-min="15">15m</button>
      </div>
      <span class="badge badge-accent" id="walletBalance">余额 --</span>
      <span class="badge" id="updatedAt">更新 --</span>
    </div>
  </header>

  <!-- ======== TOP ROW: Account | Stats | Market ======== -->
  <div class="grid-3">

    <!-- 账户总览 (DB) -->
    <section class="card">
      <div class="card-header">
        <span class="card-title">账户总览</span>
        <span class="card-badge card-badge-db">DB</span>
      </div>
      <div class="metrics metrics-2" id="accountOverview">
        <div class="metric"><div class="metric-label">余额</div><div class="metric-value" id="accBalance">--</div></div>
        <div class="metric"><div class="metric-label">总权益</div><div class="metric-value" id="accEquity">--</div></div>
        <div class="metric"><div class="metric-label">已实现盈亏</div><div class="metric-value metric-value-sm" id="accRealizedPnl">--</div></div>
        <div class="metric"><div class="metric-label">累计盈亏</div><div class="metric-value metric-value-sm" id="accCumulativePnl">--</div></div>
      </div>
    </section>

    <!-- 交易统计 (DB) -->
    <section class="card">
      <div class="card-header">
        <span class="card-title">交易统计</span>
        <span class="card-badge card-badge-db">DB</span>
      </div>
      <div class="metrics metrics-2" id="tradeStats">
        <div class="metric"><div class="metric-label">总交易</div><div class="metric-value" id="tsTotal">--</div></div>
        <div class="metric"><div class="metric-label">胜率</div><div class="metric-value" id="tsWinRate">--</div></div>
        <div class="metric"><div class="metric-label">总盈亏</div><div class="metric-value metric-value-sm" id="tsTotalPnl">--</div></div>
        <div class="metric"><div class="metric-label">平均盈亏</div><div class="metric-value metric-value-sm" id="tsAvgPnl">--</div></div>
      </div>
    </section>

    <!-- 实时市场 (SSE Live) -->
    <section class="card">
      <div class="card-header">
        <span class="card-title">实时市场</span>
        <span class="card-badge card-badge-live">LIVE</span>
      </div>
      <div class="metrics metrics-3" id="liveMarket">
        <div class="metric"><div class="metric-label">PTB</div><div class="metric-value metric-value-sm" id="mktPtb">--</div></div>
        <div class="metric"><div class="metric-label">Chainlink BTC</div><div class="metric-value metric-value-sm" id="mktChainlink">--</div></div>
        <div class="metric"><div class="metric-label">Binance BTC</div><div class="metric-value metric-value-sm" id="mktBinance">--</div></div>
        <div class="metric"><div class="metric-label">价差 (BTC-PTB)</div><div class="metric-value metric-value-sm" id="mktDiff">--</div></div>
        <div class="metric"><div class="metric-label">UP 价格</div><div class="metric-value metric-value-sm" id="mktUpPrice">--</div></div>
        <div class="metric"><div class="metric-label">DOWN 价格</div><div class="metric-value metric-value-sm" id="mktDownPrice">--</div></div>
      </div>
    </section>

  </div>

  <!-- ======== BOTTOM ROW: Trades | Logs ======== -->
  <div class="grid-2">

    <!-- 交易记录 (DB) -->
    <section class="card">
      <div class="card-header">
        <span class="card-title">交易记录</span>
        <span class="card-badge card-badge-db">DB</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>时间</th>
              <th>方向</th>
              <th>操作</th>
              <th>入价</th>
              <th>出价</th>
              <th>金额</th>
              <th>数量</th>
              <th>盈亏</th>
              <th>累计盈亏</th>
              <th>价差</th>
              <th>状态</th>
              <th>结果</th>
              <th>原因</th>
            </tr>
          </thead>
          <tbody id="tradesBody">
            <tr><td colspan="13" class="table-empty">加载中...</td></tr>
          </tbody>
        </table>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;">
        <span class="count-badge" id="tradesCount">记录: 0</span>
        <span class="count-badge" id="tradesDbLabel">SQLite</span>
      </div>
    </section>

    <!-- 实时日志 -->
    <section class="card">
      <div class="card-header">
        <span class="card-title">实时日志</span>
        <span class="card-badge card-badge-live">LIVE</span>
      </div>
      <div class="logs-box" id="logsBox"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;">
        <span class="count-badge" id="logCount">日志: 0</span>
      </div>
    </section>

  </div>
</div>

<script>
"use strict";
const $ = (id) => document.getElementById(id);

// ── DB 数据缓存 ──
let dbStats = null;
let dbAccount = null;
let dbTrades = [];
let marketData = {};
let latestPrices = {};
const priceTrend = { chainlink: {base:null,sec:0}, binance: {base:null,sec:0}, up: {base:null,sec:0}, down: {base:null,sec:0} };

// ── 工具函数 ──
const maybeNum = (v) => { if (v===null||v===void 0||v==="") return null; const n=Number(v); return Number.isFinite(n)?n:null; };
const fmt = (n,d) => n===null||n===void 0||!Number.isFinite(Number(n)) ? "-" : Number(n).toLocaleString("en-US",{minimumFractionDigits:d||2,maximumFractionDigits:d||2});
const fmtPct = (v) => v===null||v===void 0 ? "-" : (Number(v)*100).toFixed(2)+"%";
const fmtSigned = (v,d) => { if(v===null||v===void 0) return "--"; const n=Number(v); if(!Number.isFinite(n)) return "--"; return (n>=0?"+":"")+"$"+Math.abs(n).toFixed(d||2); };
const fmtPrice = (v) => v===null||v===void 0 ? "-" : "$"+fmt(v,2);
const fmtTime = (iso) => { if(!iso) return "-"; try{const d=new Date(iso); return Number.isFinite(d.getTime())?d.toLocaleString("zh-CN",{hour12:false}):String(iso).slice(0,19);}catch(e){return String(iso).slice(0,19);} };
const clsPnl = (v) => { if(v===null||v===void 0) return ""; const n=Number(v); return n>0?"text-up":n<0?"text-down":""; };
const clsSide = (s) => { if(!s) return ""; const u=String(s).toUpperCase(); return u==="UP"?"text-up":u==="DOWN"?"text-down":""; };

// ── 从 DB 获取数据 ──
async function fetchDbStats() {
  try { const r=await fetch("/api/db/stats"); if(r.ok) dbStats=await r.json(); } catch(e){}
}
async function fetchDbAccount() {
  try { const r=await fetch("/api/db/account"); if(r.ok) dbAccount=await r.json(); } catch(e){}
}
async function fetchDbTrades() {
  try { const r=await fetch("/api/db/trades?limit=100"); if(r.ok){ const j=await r.json(); if(j&&j.items) dbTrades=j.items; } } catch(e){}
}

// ── 渲染 DB 数据 ──
function renderDbStats() {
  const s = dbStats || {};
  $("tsTotal").textContent = s.total_trades ?? "--";
  $("tsWinRate").textContent = s.win_rate != null ? s.win_rate+"%" : "--";
  const tp = maybeNum(s.total_pnl);
  $("tsTotalPnl").textContent = fmtSigned(tp,3);
  $("tsTotalPnl").className = "metric-value metric-value-sm "+clsPnl(tp);
  const ap = maybeNum(s.avg_pnl);
  $("tsAvgPnl").textContent = fmtSigned(ap,3);
  $("tsAvgPnl").className = "metric-value metric-value-sm "+clsPnl(ap);
}

function renderDbAccount() {
  const a = dbAccount || {};
  const bal = maybeNum(a.balance);
  $("accBalance").textContent = bal!==null ? "$"+fmt(bal,2) : "--";
  const eq = maybeNum(a.total_equity);
  $("accEquity").textContent = eq!==null ? "$"+fmt(eq,2) : "--";
  const rp = maybeNum(a.realized_pnl);
  $("accRealizedPnl").textContent = fmtSigned(rp,3);
  $("accRealizedPnl").className = "metric-value metric-value-sm "+clsPnl(rp);
  const cp = maybeNum(a.cumulative_pnl);
  $("accCumulativePnl").textContent = fmtSigned(cp,3);
  $("accCumulativePnl").className = "metric-value metric-value-sm "+clsPnl(cp);
}

function renderDbTrades() {
  const rows = Array.isArray(dbTrades) ? dbTrades : [];
  $("tradesCount").textContent = "记录: "+rows.length;
  const tbody = $("tradesBody");
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="13" class="table-empty">暂无交易记录</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(t => {
    const side = (t.side||"").toUpperCase();
    const action = (t.action||"").toUpperCase();
    const entry = maybeNum(t.entry_price);
    const exit = maybeNum(t.exit_price);
    const amount = maybeNum(t.amount_usdc);
    const shares = maybeNum(t.shares);
    const pnl = maybeNum(t.pnl_usd);
    const cumPnl = maybeNum(t.cumulative_pnl_usd);
    const diff = maybeNum(t.diff_at_trade);
    const status = t.status || "-";
    const result = t.result || "-";
    const reason = t.open_reason || "-";
    return `<tr>
      <td>${fmtTime(t.created_at)}</td>
      <td class="${clsSide(side)}">${side}</td>
      <td>${action==="BUY"?"买入":"卖出"}</td>
      <td>${entry!==null?fmtPct(entry):"-"}</td>
      <td>${exit!==null?fmtPct(exit):"-"}</td>
      <td>${amount!==null?"$"+fmt(amount,2):"-"}</td>
      <td>${shares!==null?fmt(shares,4):"-"}</td>
      <td class="${clsPnl(pnl)}">${pnl!==null?fmtSigned(pnl,3):"-"}</td>
      <td class="${clsPnl(cumPnl)}">${cumPnl!==null?fmtSigned(cumPnl,3):"-"}</td>
      <td class="${diff!==null?(diff>=0?"text-up":"text-down"):""}">${diff!==null?(diff>=0?"+":"")+fmt(diff,0):"-"}</td>
      <td>${status==="filled"?"成交":status}</td>
      <td class="${result==="win"?"text-up":result==="loss"?"text-down":"text-warn"}">${result==="win"?"赢":result==="loss"?"亏":result}</td>
      <td>${reason}</td>
    </tr>`;
  }).join("");
}

function renderAllDb() {
  renderDbStats();
  renderDbAccount();
  renderDbTrades();
}

// ── 实时市场渲染 (来自 SSE) ──
function renderMarket(data) {
  const mkt = data.market || {};
  const prices = data.prices || {};
  marketData = data;
  latestPrices = prices;

  $("marketSlug").textContent = mkt.slug || "-";
  $("updatedAt").textContent = "更新 "+(data.updated_at ? fmtTime(data.updated_at) : "--");

  const sim = data.simulation_mode;
  $("simMode").textContent = sim ? "模拟模式" : "实盘模式";

  const bal = data.wallet_balance;
  $("walletBalance").textContent = bal!==null&&bal!==void 0 ? "余额 $"+fmt(bal,2) : "余额 --";

  if (data.btc_market_minutes != null) {
    document.querySelectorAll(".interval-btn").forEach(b => {
      b.classList.toggle("active", Number(b.dataset.min) === Number(data.btc_market_minutes));
    });
  }

  // 价格
  $("mktPtb").textContent = fmtPrice(prices.ptb);
  setPriceArrow("mktChainlink", prices.chainlink_btc, "chainlink");
  setPriceArrow("mktBinance", prices.binance_btc, "binance");
  setPctArrow("mktUpPrice", prices.up_price, "up");
  setPctArrow("mktDownPrice", prices.down_price, "down");
  setDiffEl(prices.diff);
}

function setPriceArrow(elId, val, key) {
  const el = $(elId);
  const n = maybeNum(val);
  if (n === null) { el.textContent="-"; el.className="metric-value metric-value-sm"; priceTrend[key]={base:null,sec:0}; return; }
  const now = Math.floor(Date.now()/1000);
  const st = priceTrend[key]||{base:null,sec:0};
  let arrow = "→", cls = "text-warn";
  if (st.base !== null) { if (n>st.base) { arrow="↑"; cls="text-up"; } else if (n<st.base) { arrow="↓"; cls="text-down"; } }
  el.textContent = fmtPrice(n)+" "+arrow;
  el.className = "metric-value metric-value-sm "+cls;
  if (st.sec !== now) { st.base = n; st.sec = now; }
  priceTrend[key] = st;
}

function setPctArrow(elId, val, key) {
  const el = $(elId);
  const n = maybeNum(val);
  if (n === null) { el.textContent="-"; el.className="metric-value metric-value-sm"; priceTrend[key]={base:null,sec:0}; return; }
  const now = Math.floor(Date.now()/1000);
  const st = priceTrend[key]||{base:null,sec:0};
  let arrow = "→", cls = "text-warn";
  if (st.base !== null) { if (n>st.base) { arrow="↑"; cls="text-up"; } else if (n<st.base) { arrow="↓"; cls="text-down"; } }
  el.textContent = fmtPct(n)+" "+arrow;
  el.className = "metric-value metric-value-sm "+cls;
  if (st.sec !== now) { st.base = n; st.sec = now; }
  priceTrend[key] = st;
}

function setDiffEl(v) {
  const el = $("mktDiff");
  const n = maybeNum(v);
  if (n === null) { el.textContent="-"; el.className="metric-value metric-value-sm"; return; }
  el.textContent = (n>=0?"+":"")+fmt(n,0);
  el.className = "metric-value metric-value-sm "+(n>0?"text-up":n<0?"text-down":"text-warn");
}

// ── 实时日志 ──
let logSig = "";
function renderLogs(items) {
  const sig = JSON.stringify((items||[]).slice(-20));
  if (sig === logSig) return;
  logSig = sig;
  const box = $("logsBox");
  box.innerHTML = "";
  const arr = Array.isArray(items) ? items : [];
  $("logCount").textContent = "日志: "+arr.length;
  for (const row of arr) {
    const p = document.createElement("div");
    p.className = "log-line log-"+(row.level||"INFO");
    p.textContent = "["+(row.time||"--:--:--")+"] "+(row.message||"");
    box.appendChild(p);
  }
  box.scrollTop = box.scrollHeight;
}

// ── SSE 流 ──
function startSSE() {
  if (!("EventSource" in window)) return;
  try {
    const es = new EventSource("/api/stream");
    es.addEventListener("status", ev => {
      try { const d = JSON.parse(ev.data||"{}"); if (d && d.data) renderMarket(d.data); } catch(e){}
    });
    es.addEventListener("logs", ev => {
      try { const d = JSON.parse(ev.data||"{}"); if (d && d.items) renderLogs(d.items); } catch(e){}
    });
  } catch(_) {}
}

// ── DB 数据轮询 ──
async function pollDb() {
  await Promise.all([fetchDbStats(), fetchDbAccount(), fetchDbTrades()]);
  renderAllDb();
}

// ── 初始化 ──
pollDb();
setInterval(pollDb, 5000);

startSSE();

// Fallback HTTP polling for live data
async function pollStatus() {
  try {
    const r = await fetch("/api/status", {cache:"no-store"});
    if (r.ok) renderMarket(await r.json());
  } catch(_) {}
}
async function pollLogs() {
  try {
    const r = await fetch("/api/logs", {cache:"no-store"});
    if (r.ok) { const j = await r.json(); renderLogs((j&&j.items)||[]); }
  } catch(_) {}
}
setInterval(pollStatus, 5000);
setInterval(pollLogs, 2000);

// 周期切换
document.querySelectorAll(".interval-btn").forEach(btn => {
  btn.addEventListener("click", async () => {
    const m = Number(btn.dataset.min);
    if (!Number.isFinite(m)) return;
    document.querySelectorAll(".interval-btn").forEach(b => b.disabled = true);
    try {
      const r = await fetch("/api/btc-market-minutes", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({minutes:m})
      });
      if (r.ok) pollStatus();
    } catch(_) {} finally {
      document.querySelectorAll(".interval-btn").forEach(b => b.disabled = false);
    }
  });
});
</script>
