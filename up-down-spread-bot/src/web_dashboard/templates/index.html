<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meridian — 控制与分析</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <div class="layout">
    <header class="header">
      <h1>Meridian</h1>
      <p class="subtitle" id="header-subtitle">Polymarket 控制台 · 实时状态 · 设置 · 分析</p>
      <div class="header-actions">
        <span id="conn-badge" class="badge badge-warn">连接中…</span>
        <a href="/" class="btn btn-primary" style="opacity:0.8">仪表盘</a>
        <a href="/trades" class="btn btn-secondary">交易记录</a>
        <a href="/balance" class="btn btn-secondary">余额变动</a>
        <a href="/stats" class="btn btn-secondary">交易统计</a>
        <button type="button" id="btn-refresh" class="btn btn-secondary">立即刷新</button>
        <button type="button" id="btn-stop" class="btn btn-danger">请求停止</button>
      </div>
    </header>

    <section class="panel summary" id="panel-summary">
      <h2>会话</h2>
      <div class="grid-4" id="summary-stats"></div>
    </section>

    <section class="panel">
      <h2>市场 (实时)</h2>
      <div class="coins-grid" id="coins-container"></div>
    </section>

    <section class="panel">
      <h2>最近已平仓交易 <a href="/trades" class="btn btn-secondary" style="font-size:0.8rem;padding:0.2rem 0.6rem">查看全部</a></h2>
      <div class="table-wrap">
        <table class="data-table" id="recent-trades">
          <thead>
            <tr>
              <th>平仓时间</th>
              <th>市场</th>
              <th>方向</th>
              <th>盈亏 ($)</th>
              <th>ROI (%)</th>
              <th>退出类型</th>
              <th>胜方</th>
              <th>Polymarket</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <h2>设置 <span class="hint">(编辑 JSON — 重启机器人生效)</span></h2>
      <div class="settings-row">
        <textarea id="config-editor" spellcheck="false" rows="18"></textarea>
        <div class="settings-actions">
          <button type="button" id="btn-load-config" class="btn btn-secondary">从磁盘重新加载</button>
          <button type="button" id="btn-save-config" class="btn btn-primary">保存 config.json</button>
        </div>
        <p id="config-message" class="message"></p>
      </div>
    </section>

    <footer class="footer">
      <p>API: <code>/api/status</code>, <code>/api/config</code>, <code>POST /api/bot/stop</code> · 使用 <code>python main.py --web</code> 启动机器人</p>
    </footer>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
