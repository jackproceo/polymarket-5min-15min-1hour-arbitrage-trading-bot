<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>交易记录 — Meridian</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <div class="layout">
    <header class="header">
      <h1>交易记录</h1>
      <p class="subtitle">已平仓交易明细 · 盈亏 · Polymarket 链接</p>
      <div class="header-actions">
        <span id="conn-badge" class="badge badge-warn">连接中…</span>
        <a href="/" class="btn btn-secondary">仪表盘</a>
        <a href="/trades" class="btn btn-primary" style="opacity:0.8">交易记录</a>
        <a href="/balance" class="btn btn-secondary">余额变动</a>
        <a href="/stats" class="btn btn-secondary">交易统计</a>
        <button type="button" id="btn-refresh" class="btn btn-secondary">刷新</button>
        <button type="button" id="btn-stop" class="btn btn-danger">请求停止</button>
      </div>
    </header>

    <section class="panel">
      <div class="filter-row">
        <label>
          币种筛选：
          <select id="filter-coin">
            <option value="">全部</option>
            <option value="BTC">BTC</option>
            <option value="ETH">ETH</option>
            <option value="SOL">SOL</option>
            <option value="XRP">XRP</option>
          </select>
        </label>
        <span class="hint" id="trade-count"></span>
      </div>
      <div class="table-wrap">
        <table class="data-table" id="trades-table">
          <thead>
            <tr>
              <th>平仓时间</th>
              <th>市场</th>
              <th>方向</th>
              <th>入场价</th>
              <th>合约数</th>
              <th>投入 ($)</th>
              <th>盈亏 ($)</th>
              <th>ROI (%)</th>
              <th>胜方</th>
              <th>退出类型</th>
              <th>持仓 (秒)</th>
              <th>Polymarket</th>
            </tr>
          </thead>
          <tbody id="trades-body"></tbody>
        </table>
      </div>
      <div class="pagination-row" id="pagination">
        <button type="button" id="btn-prev" class="btn btn-secondary">← 上一页</button>
        <span id="page-info">第 1 页</span>
        <button type="button" id="btn-next" class="btn btn-secondary">下一页 →</button>
      </div>
    </section>

    <footer class="footer">
      <p>API: <code>/api/trades</code> · 数据来源：SQLite 数据库</p>
    </footer>
  </div>
  <script src="/static/app.js"></script>
  <script>
    (function () {
      const PER_PAGE = 50;
      let currentOffset = 0;
      const tbody = document.getElementById("trades-body");
      const pageInfo = document.getElementById("page-info");
      const coinSelect = document.getElementById("filter-coin");
      const tradeCount = document.getElementById("trade-count");

      async function fetchTrades(offset) {
        const coin = coinSelect.value;
        let url = `/api/trades?limit=${PER_PAGE}&offset=${offset}`;
        if (coin) url += `&coin=${coin}`;
        const r = await fetch(url, { cache: "no-store" });
        return r.json();
      }

      function render(data) {
        const rows = data.trades || [];
        tradeCount.textContent = `共 ${data.total} 条记录`;
        if (!rows.length) {
          tbody.innerHTML = '<tr><td colspan="12">暂无交易记录</td></tr>';
          return;
        }
        tbody.innerHTML = rows.map(t => {
          const pnl = t.pnl_display || 0;
          const pnlCls = pnl >= 0 ? "pnl-pos" : "pnl-neg";
          const side = t.side || "—";
          const winner = t.winner || "—";
          const exitType = t.exit_type || "—";
          const url = t.polymarket_url || "";
          const linkHtml = url
            ? `<a href="${url}" target="_blank" rel="noopener" title="${escapeHtml(t.market_slug || "")}">🔗 查看</a>`
            : "—";
          const slugShort = (t.market_slug || "").split("-").pop() || t.market_slug || "—";
          return `<tr>
            <td class="cell-nobreak">${escapeHtml(t.close_time || t.close_timestamp || "—")}</td>
            <td title="${escapeHtml(t.market_slug || "")}">${escapeHtml(slugShort)}</td>
            <td>${escapeHtml(side)}</td>
            <td>${t.entry_price != null ? t.entry_price.toFixed(4) : "—"}</td>
            <td>${t.contracts != null ? Number(t.contracts).toFixed(2) : "—"}</td>
            <td>${t.size_usd != null ? t.size_usd.toFixed(2) : "—"}</td>
            <td class="${pnlCls}"><strong>${pnl >= 0 ? "+" : ""}${pnl.toFixed(2)}</strong></td>
            <td class="${pnlCls}">${t.roi_display != null ? (t.roi_display >= 0 ? "+" : "") + t.roi_display.toFixed(2) : "—"}</td>
            <td>${escapeHtml(winner)}</td>
            <td>${escapeHtml(exitType)}</td>
            <td>${t.duration_sec != null ? Math.round(t.duration_sec) : "—"}</td>
            <td>${linkHtml}</td>
          </tr>`;
        }).join("");
      }

      function escapeHtml(s) {
        if (s == null) return "";
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      async function loadPage(offset) {
        currentOffset = Math.max(0, offset);
        pageInfo.textContent = `第 ${Math.floor(currentOffset / PER_PAGE) + 1} 页`;
        const data = await fetchTrades(currentOffset);
        render(data);
      }

      document.getElementById("btn-refresh").addEventListener("click", () => loadPage(currentOffset));
      document.getElementById("btn-prev").addEventListener("click", () => loadPage(currentOffset - PER_PAGE));
      document.getElementById("btn-next").addEventListener("click", () => loadPage(currentOffset + PER_PAGE));
      coinSelect.addEventListener("change", () => loadPage(0));

      loadPage(0);
    })();
  </script>
</body>
</html>
